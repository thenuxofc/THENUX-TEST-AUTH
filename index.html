<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THENUX OTP Login</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 400px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f5f7fc;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            background: #00e5ff;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 0.5rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            display: none;
        }
        .error { background: #fee; color: #c00; display: block; }
        .success { background: #efe; color: #060; display: block; }
        .info { background: #eef; color: #006; display: block; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 THENUX OTP Login</h2>
    <p>Enter your email, then the 6‑digit code from your authenticator app.</p>

    <div id="step1">
        <input type="email" id="email" placeholder="Email">
        <button id="sendBtn">Send OTP</button>
    </div>

    <div id="step2" style="display:none;">
        <input type="text" id="otp" placeholder="6‑digit code" maxlength="6">
        <button id="verifyBtn">Verify Code</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
    const API_KEY = 'tnxe_3a18b2eef0a3fb3c8d2b334a75a46776dc3ed73c475ba3ba362ee024'; // Replace with your actual key
    const BASE = 'https://thenux-auth.netlify.app';
    let sessionToken = null;

    const sendBtn = document.getElementById('sendBtn');
    const verifyBtn = document.getElementById('verifyBtn');
    const emailInput = document.getElementById('email');
    const otpInput = document.getElementById('otp');
    const step1Div = document.getElementById('step1');
    const step2Div = document.getElementById('step2');
    const msgDiv = document.getElementById('message');

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        setTimeout(() => { msgDiv.className = 'message'; }, 5000);
    }

    sendBtn.onclick = async () => {
        const email = emailInput.value.trim();
        if (!email) return showMessage('Email required', 'error');

        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';

        try {
            const res = await fetch(`${BASE}/.netlify/functions/send-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-thenux-key': API_KEY
                },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (!res.ok || !data.success) throw new Error(data.error || 'Request failed');

            sessionToken = data.otpSessionToken;
            showMessage('✓ OTP sent. Enter the 6‑digit code from your authenticator app.', 'success');
            step1Div.style.display = 'none';
            step2Div.style.display = 'block';
            otpInput.focus();
        } catch (err) {
            showMessage(err.message, 'error');
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send OTP';
        }
    };

    verifyBtn.onclick = async () => {
        const code = otpInput.value.trim();
        if (!code || !/^\d{6}$/.test(code)) return showMessage('Enter a 6‑digit code', 'error');

        verifyBtn.disabled = true;
        verifyBtn.textContent = 'Verifying...';

        try {
            const res = await fetch(`${BASE}/.netlify/functions/verify-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-thenux-key': API_KEY
                },
                body: JSON.stringify({ code, otpSessionToken: sessionToken })
            });
            const data = await res.json();
            if (!res.ok || !data.success) throw new Error(data.error || 'Invalid code');

            showMessage(`✅ Welcome ${data.user.email}! JWT received.`, 'success');
            console.log('JWT:', data.tokens.accessToken);
            console.log('User:', data.user);
            // Redirect or store token as needed
        } catch (err) {
            showMessage(err.message, 'error');
        } finally {
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify Code';
        }
    };
</script>
</body>
</html>
